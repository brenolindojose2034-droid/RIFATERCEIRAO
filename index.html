<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Terceirão 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d14771; --secondary: #0a2342; --green: #2ecc71; --orange: #f39c12; --bg: #fdf2f5; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 0; }
        .header { background: var(--secondary); color: white; padding: 30px; text-align: center; border-radius: 0 0 20px 20px; }
        .container { max-width: 800px; margin: 20px auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin: 20px 0; }
        .n-btn { border: none; padding: 15px 0; border-radius: 8px; font-weight: 800; cursor: pointer; background: #eee; }
        .n-btn.livre { background: #ffe6eb; color: var(--primary); }
        .n-btn.sel { background: var(--green) !important; color: white; }
        .n-btn.pendente { background: var(--orange) !important; color: white; cursor: not-allowed; }
        .n-btn.pago { background: var(--secondary) !important; color: white; cursor: not-allowed; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; }
        .modal-content { background:white; padding:25px; border-radius:15px; width:90%; max-width:400px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header">
    <h1>Rifa Dia das Mães 🌸</h1>
    <p>Terceirão 2026 - Escola IRB</p>
</div>

<div class="container">
    <div id="view-vendas">
        <div class="card">
            <p style="text-align:center; font-weight:bold;">Valor da Cota: R$ <span id="display-preco">--</span></p>
            <div class="grid-numeros" id="grid"></div>
            <button class="btn-main" onclick="abrirCheckout()">RESERVAR SELECIONADOS</button>
            <button onclick="pedirSenha()" style="background:none; border:none; color:#ccc; width:100%; margin-top:20px; cursor:pointer;">Admin ⚙️</button>
        </div>
    </div>

    <div id="view-admin" style="display:none;">
        <div class="card">
            <h3>Painel de Controle</h3>
            <button onclick="baixarPlanilha()" style="background:var(--green); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">📥 Baixar Lista CSV</button>
            <button onclick="mudarPreco()" style="margin-left:10px;">💲 Mudar Preço</button>
            
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Nº</th><th>Nome</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="tabela-admin"></tbody>
                </table>
            </div>
            <button class="btn-main" onclick="location.reload()" style="margin-top:20px; background:var(--secondary);">VOLTAR AO SITE</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-checkout">
    <div class="modal-content">
        <h3>Finalizar Reserva</h3>
        <p>Números: <span id="resumo-cotas"></span></p>
        <input type="text" id="c-nome" placeholder="Seu Nome">
        <input type="tel" id="c-zap" placeholder="WhatsApp">
        <input type="text" id="c-vendedor" placeholder="Quem te indicou?">
        <button class="btn-main" id="btn-pay" onclick="finalizarPagamento()">PAGAR AGORA</button>
    </div>
</div>

<script>
    const API_URL = 'https://rifa-backend-e44o.onrender.com';
    let dbStatus = {};
    let precoCota = 10;
    let selecionados = [];
    let senhaAdmin = '';

    async function carregarStatus() {
        try {
            const res = await fetch(`${API_URL}/status-rifa`);
            const data = await res.json();
            dbStatus = data.dados;
            precoCota = data.preco;
            document.getElementById('display-preco').innerText = precoCota.toFixed(2);
            renderizarGrade();
        } catch (e) { alert("Erro ao carregar dados do servidor."); }
    }

    function renderizarGrade() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.className = 'n-btn';
            
            // Verificação com colchetes dbStatus[i]
            if (dbStatus[i]) {
                btn.classList.add(dbStatus[i].status === 'Pago' ? 'pago' : 'pendente');
            } else {
                btn.classList.add('livre');
                btn.onclick = () => {
                    if(selecionados.includes(i)) {
                        selecionados = selecionados.filter(n => n !== i);
                        btn.classList.remove('sel');
                    } else {
                        selecionados.push(i);
                        btn.classList.add('sel');
                    }
                };
            }
            grid.appendChild(btn);
        }
    }

    function abrirCheckout() {
        if(selecionados.length === 0) return alert("Escolha um número!");
        document.getElementById('resumo-cotas').innerText = selecionados.join(', ');
        document.getElementById('modal-checkout').style.display = 'flex';
    }

    async function finalizarPagamento() {
        const btn = document.getElementById('btn-pay');
        btn.disabled = true; btn.innerText = "GERANDO...";
        
        try {
            const res = await fetch(`${API_URL}/gerar-pagamento`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    numeros: selecionados,
                    comprador: document.getElementById('c-nome').value,
                    zap: document.getElementById('c-zap').value,
                    vendedor: document.getElementById('c-vendedor').value
                })
            });
            const data = await res.json();
            if(data.link) window.location.href = data.link;
            else alert(data.erro);
        } catch (e) { alert("Erro na conexão"); btn.disabled = false; }
    }

    function pedirSenha() {
        senhaAdmin = prompt("Senha:");
        if(senhaAdmin === 'IRB2026') {
            document.getElementById('view-vendas').style.display = 'none';
            document.getElementById('view-admin').style.display = 'block';
            renderAdmin();
        }
    }

    function renderAdmin() {
        const tabela = document.getElementById('tabela-admin');
        tabela.innerHTML = '';
        Object.keys(dbStatus).forEach(n => {
            const d = dbStatus[n];
            tabela.innerHTML += `<tr>
                <td>#${n}</td><td>${d.nome}</td>
                <td>${d.status}</td>
                <td>
                    <button onclick="admAcao(${n}, 'pagar')">✔</button>
                    <button onclick="admAcao(${n}, 'excluir')">🗑</button>
                </td>
            </tr>`;
        });
    }

    async function admAcao(numero, acao) {
        await fetch(`${API_URL}/admin/acao`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ numero, acao, senha: senhaAdmin })
        });
        location.reload();
    }

    async function mudarPreco() {
        const novo = prompt("Novo preço:");
        await fetch(`${API_URL}/admin/config`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ novoPreco: novo, senha: senhaAdmin })
        });
        location.reload();
    }

    function baixarPlanilha() {
        let csv = "Cota,Nome,Zap,Vendedor,Status\n";
        Object.keys(dbStatus).forEach(n => {
            const d = dbStatus[n];
            csv += `${n},${d.nome},${d.zap},${d.vendedor},${d.status}\n`;
        });
        
        // AQUI ESTÁ O AJUSTE CRÍTICO: [csv] dentro dos colchetes
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "Rifa_Terceirao.csv";
        link.click();
    }

    carregarStatus();
</script>
</body>
</html>
