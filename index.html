<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIFA TERCEIRÃO 2026 | PREMIUM</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff0055; --dark: #050505; --card: rgba(255, 255, 255, 0.05); --glass: rgba(255, 255, 255, 0.1); }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Header Estilo Luxury */
        .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&q=80&w=1000'); background-size: cover; padding: 60px 20px; text-align: center; border-bottom: 2px solid var(--main); }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5em; margin: 0; letter-spacing: 4px; color: var(--main); }
        
        .container { max-width: 1000px; margin: -40px auto 50px; padding: 15px; }
        .glass-card { background: var(--card); backdrop-filter: blur(15px); border: 1px solid var(--glass); border-radius: 25px; padding: 25px; margin-bottom: 20px; }
        
        /* Grid Gamer/Premium */
        .grid-rifa { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; margin: 25px 0; }
        @media (max-width: 700px) { .grid-rifa { grid-template-columns: repeat(5, 1fr); } }

        .btn-n { border: 1px solid var(--glass); padding: 15px 0; border-radius: 12px; font-weight: 800; cursor: pointer; background: var(--glass); color: #fff; font-size: 1em; transition: 0.2s; }
        .btn-n.livre:hover { border-color: var(--main); box-shadow: 0 0 15px var(--main); }
        .btn-n.sel { background: var(--main) !important; color: white; transform: scale(1.1); border: none; }
        .btn-n.pendente { background: #333 !important; color: #666; cursor: not-allowed; opacity: 0.5; }
        .btn-n.pago { background: #00ff88 !important; color: #000; box-shadow: 0 0 10px #00ff88; }

        /* Barra de Progresso */
        .progress-container { background: #222; border-radius: 50px; height: 15px; margin: 20px 0; overflow: hidden; }
        .progress-bar { background: var(--main); height: 100%; width: 0%; transition: 1s ease-in-out; }

        .buy-btn { background: var(--main); color: white; border: none; padding: 20px; border-radius: 50px; width: 100%; font-weight: 800; font-size: 1.2em; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Painel Admin Moderno */
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat { background: var(--glass); padding: 20px; border-radius: 20px; text-align: center; border-left: 4px solid var(--main); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--main); padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 15px 10px; border-bottom: 1px solid #222; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; }
        .modal-box { background: #111; padding: 40px; border-radius: 30px; border: 1px solid var(--main); width: 90%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 1em; }
    </style>
</head>
<body>

<div class="hero">
    <h1>TERCEIRÃO 2026</h1>
    <p>RIFA EXCLUSIVA | ESCOLA IRB</p>
</div>

<div class="container">
    <div id="vendas-ui">
        <div class="glass-card">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span>VENDIDOS: <b id="count-vendidos">0</b>/100</span>
                <span>VALOR: <b style="color:var(--main)">R$ <span id="val-cota">0</span></b></span>
            </div>
            <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
            
            <div class="grid-rifa" id="grid"></div>
            
            <button class="buy-btn" onclick="abrirCheck()">RESERVAR AGORA</button>
            <button onclick="admLogin()" style="background:none; border:none; color:#444; width:100%; margin-top:20px; cursor:pointer;">ADMIN PANEL</button>
        </div>
    </div>

    <div id="admin-ui" style="display:none;">
        <div class="admin-grid">
            <div class="stat"><h3>Faturamento</h3><p id="adm-faturado">R$ 0</p></div>
            <div class="stat"><h3>Pendentes</h3><p id="adm-pendente">R$ 0</p></div>
            <div class="stat"><h3>Ações</h3>
                <button onclick="mudarPreco()" style="padding:5px; margin-bottom:5px;">Mudar Valor</button>
                <button onclick="limparTudo()" style="background:red; color:white;">Reset Geral</button>
                <button onclick="sortear()" style="background:gold; color:black;">Sortear Ganhador</button>
            </div>
        </div>
        <div class="glass-card">
            <input type="text" id="busca" placeholder="Buscar por nome ou número..." onkeyup="filtrar()">
            <table>
                <thead><tr><th>Nº</th><th>Nome</th><th>Vendedor</th><th>Status</th><th>Ações</th></tr></thead>
                <tbody id="lista-admin"></tbody>
            </table>
            <button class="buy-btn" onclick="location.reload()" style="margin-top:20px; background:#444;">VOLTAR</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-c">
    <div class="modal-box">
        <h2 style="color:var(--main)">FINALIZAR RESERVA</h2>
        <p id="resumo"></p>
        <input type="text" id="n" placeholder="Seu Nome Completo">
        <input type="tel" id="z" placeholder="WhatsApp (81) 9....">
        <input type="text" id="v" placeholder="Aluno que te vendeu">
        <button class="buy-btn" id="pay-b" onclick="pagar()">IR PARA PAGAMENTO</button>
        <button onclick="fechar()" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer;">CANCELAR</button>
    </div>
</div>

<script>
    const API = 'https://rifa-backend-e44o.onrender.com';
    let db = {}, valor = 10, sel = [], senha = '';

    async function carregar() {
        const r = await fetch(`${API}/status-rifa`);
        const d = await r.json();
        db = d.dados; valor = d.preco;
        document.getElementById('val-cota').innerText = valor.toFixed(2);
        render();
        if(document.getElementById('admin-ui').style.display === 'block') renderAdm();
    }

    function render() {
        const g = document.getElementById('grid'); g.innerHTML = '';
        let count = 0;
        for(let i=1; i<=100; i++) {
            const b = document.createElement('button'); b.innerText = i; b.className = 'btn-n';
            if(db[i]) {
                b.classList.add(db[i].status === 'Pago' ? 'pago' : 'pendente');
                count++;
            } else {
                b.classList.add('livre');
                if(sel.includes(i)) b.classList.add('sel');
                b.onclick = () => {
                    if(sel.includes(i)) sel = sel.filter(x => x!==i);
                    else sel.push(i);
                    render();
                }
            }
            g.appendChild(b);
        }
        document.getElementById('count-vendidos').innerText = count;
        document.getElementById('bar').style.width = count + '%';
    }

    function abrirCheck() {
        if(!sel.length) return alert("Escolha os números!");
        document.getElementById('resumo').innerText = `Números: ${sel.join(', ')} | Total: R$ ${(sel.length * valor).toFixed(2)}`;
        document.getElementById('modal-c').style.display = 'flex';
    }

    async function pagar() {
        const btn = document.getElementById('pay-b'); btn.innerText = "PROCESSANDO..."; btn.disabled = true;
        const res = await fetch(`${API}/gerar-pagamento`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ numeros: sel, comprador: document.getElementById('n').value, zap: document.getElementById('z').value, vendedor: document.getElementById('v').value })
        });
        const d = await res.json();
        if(d.link) window.location.href = d.link;
    }

    // --- ADMIN FUNCTIONS ---
    function admLogin() {
        senha = prompt("Senha Admin:");
        if(senha === 'IRB2026') {
            document.getElementById('vendas-ui').style.display = 'none';
            document.getElementById('admin-ui').style.display = 'block';
            renderAdm();
        }
    }

    function renderAdm() {
        const l = document.getElementById('lista-admin'); l.innerHTML = '';
        let pago = 0, pend = 0;
        Object.keys(db).forEach(n => {
            const d = db[n];
            if(d.status === 'Pago') pago += valor; else pend += valor;
            l.innerHTML += `<tr>
                <td>#${n}</td><td>${d.nome}</td><td>${d.vendedor}</td>
                <td><b style="color:${d.status === 'Pago' ? '#00ff88' : '#ff9900'}">${d.status}</b></td>
                <td>
                    <button onclick="admAcao(${n}, 'pagar')">✔</button>
                    <button onclick="admAcao(${n}, 'excluir')" style="color:red">🗑</button>
                    <a href="https://wa.me/${d.zap.replace(/\D/g,'')}" target="_blank">📱</a>
                </td>
            </tr>`;
        });
        document.getElementById('adm-faturado').innerText = `R$ ${pago}`;
        document.getElementById('adm-pendente').innerText = `R$ ${pend}`;
    }

    async function admAcao(n, acao) {
        if(!confirm("Confirmar?")) return;
        await fetch(`${API}/admin/acao`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ numero: n, acao, senha })
        });
        carregar();
    }

    async function mudarPreco() {
        const n = prompt("Novo Preço da Cota:");
        if(!n) return;
        await fetch(`${API}/admin/config`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ novoPreco: n, senha })
        });
        carregar();
    }

    async function limparTudo() {
        if(confirm("DELETAR TODAS AS VENDAS?")) {
            await fetch(`${API}/admin/acao`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ acao: 'limpar_tudo', senha })
            });
            carregar();
        }
    }

    function sortear() {
        const pagos = Object.keys(db).filter(n => db[n].status === 'Pago');
        if(!pagos.length) return alert("Nenhum número pago!");
        const win = pagos[Math.floor(Math.random() * pagos.length)];
        alert(`O NÚMERO GANHADOR É: #${win} - ${db[win].nome}!!! 🎉`);
        confetti({ particleCount: 200, spread: 100 });
    }

    function fechar() { document.getElementById('modal-c').style.display = 'none'; }
    carregar();
    setInterval(carregar, 30000);
</script>
</body>
</html>
