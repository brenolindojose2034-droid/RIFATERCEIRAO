<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIFA DIA DAS MÃES | TERCEIRÃO 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #007bff; --light-blue: #00d4ff; --pink: #ff0055; --dark: #050a15; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        
        .header { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&q=80&w=1000'); background-size: cover; padding: 60px 20px; text-align: center; border-bottom: 2px solid var(--blue); }
        .logo-terceirao { max-width: 150px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--blue)); }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5em; color: var(--pink); margin: 0; text-shadow: 0 0 20px var(--pink); }
        .header p { color: #00d4ff; letter-spacing: 3px; font-weight: bold; margin-top: 10px; }

        .container { max-width: 900px; margin: -40px auto 50px; padding: 15px; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .stats-top { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }
        .progress-bar { background: #111; border-radius: 50px; height: 12px; margin-bottom: 25px; overflow: hidden; border: 1px solid #222; }
        .progress-fill { background: linear-gradient(90deg, var(--blue), var(--light-blue)); height: 100%; width: 0%; transition: 1s; box-shadow: 0 0 15px var(--blue); }

        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; margin-bottom: 30px; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .n { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px 0; border-radius: 12px; color: #fff; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .n.livre:hover { border-color: var(--light-blue); box-shadow: 0 0 15px var(--blue); transform: scale(1.05); }
        .n.sel { background: var(--blue) !important; border: none; transform: scale(1.1); box-shadow: 0 0 20px var(--blue); }
        .n.pendente { background: #f39c12 !important; color: #000; cursor: not-allowed; border: none; }
        .n.pago { background: #00ff88 !important; color: #000; cursor: not-allowed; border: none; box-shadow: 0 0 15px #00ff88; }

        .main-btn { background: var(--blue); color: #fff; border: none; padding: 20px; border-radius: 50px; width: 100%; font-weight: 800; font-size: 1.2em; cursor: pointer; box-shadow: 0 5px 20px rgba(0, 123, 255, 0.4); text-transform: uppercase; }
        .main-btn:hover { background: #0056b3; transform: translateY(-3px); }

        /* Admin */
        .adm-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .adm-card { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 20px; text-align: center; border-top: 3px solid var(--blue); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th { text-align: left; color: var(--light-blue); padding: 10px; border-bottom: 2px solid #222; }
        td { padding: 12px 10px; border-bottom: 1px solid #111; }
        .btn-adm { background: #222; color: #fff; border: 1px solid #444; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
        .modal-box { background: #0a0a0a; padding: 40px; border-radius: 30px; border: 1px solid var(--blue); width: 90%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #222; background: #000; color: #fff; font-size: 1em; }
        input:focus { border-color: var(--blue); outline: none; }
    </style>
</head>
<body>

<div class="header">
    <img src="COLOCA_O_LINK_DA_SUA_LOGO_AQUI" class="logo-terceirao" alt="TERCEIRÃO 2026">
    <h1>RIFA DOS DIAS DAS MÃES</h1>
    <p>TERCEIRÃO 2026</p>
</div>

<div class="container">
    <div id="view-vendas">
        <div class="card">
            <div class="stats-top">
                <span>VENDIDOS: <span id="count">0</span>/100</span>
                <span style="color:var(--light-blue)">VALOR: R$ <span id="preco">0.00</span></span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
            <div class="grid" id="grid"></div>
            <button class="main-btn" onclick="abrirCheck()">RESERVAR NÚMEROS</button>
            <button onclick="admLogin()" style="background:none; border:none; color:#111; width:100%; margin-top:40px; cursor:pointer;">Admin ⚙️</button>
        </div>
    </div>

    <div id="view-admin" style="display:none;">
        <div class="adm-grid">
            <div class="adm-card"><h3>Pago</h3><p id="adm-pago" style="color:#00ff88">R$ 0</p></div>
            <div class="adm-card"><h3>Pendente</h3><p id="adm-pend" style="color:#f39c12">R$ 0</p></div>
            <div class="adm-card"><h3>Total</h3><p id="adm-total">0/100</p></div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <button class="btn-adm" onclick="mudarPreco()">💲 Alterar Preço</button>
                <button class="btn-adm" onclick="limparTudo()" style="color:red">🗑 Reset Geral</button>
            </div>
            <input type="text" id="busca" placeholder="Filtrar por nome ou número..." onkeyup="filtrar()">
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Nº</th><th>Nome</th><th>Vendedor</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="lista-adm"></tbody>
                </table>
            </div>
            <button class="main-btn" onclick="location.reload()" style="margin-top:20px; background:#111;">SAIR DO ADMIN</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-c">
    <div class="modal-box">
        <h2 style="color:var(--blue)">CHECKOUT</h2>
        <p id="resumo"></p>
        <input type="text" id="i-nome" placeholder="Seu Nome Completo">
        <input type="tel" id="i-zap" placeholder="WhatsApp">
        <input type="text" id="i-vend" placeholder="Quem te vendeu? (Opcional)">
        <button class="main-btn" id="btn-pay" onclick="pagar()">GERAR PAGAMENTO PIX</button>
        <button onclick="fechar()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
    const API = 'https://rifa-backend-e44o.onrender.com';
    let db = {}, valor = 10, sel = [], senha = '';

    async function carregar() {
        const r = await fetch(`${API}/status-rifa`);
        const d = await r.json();
        db = d.dados; valor = d.preco;
        document.getElementById('preco').innerText = valor.toFixed(2);
        render();
        if(document.getElementById('view-admin').style.display === 'block') renderAdm();
    }

    function render() {
        const g = document.getElementById('grid'); g.innerHTML = '';
        let count = 0;
        for(let i=1; i<=100; i++) {
            const b = document.createElement('button'); b.innerText = i; b.className = 'n';
            if(db[i]) {
                b.classList.add(db[i].status === 'Pago' ? 'pago' : 'pendente');
                count++;
            } else {
                b.classList.add('livre');
                if(sel.includes(i)) b.classList.add('sel');
                b.onclick = () => {
                    if(sel.includes(i)) sel = sel.filter(x => x!==i);
                    else sel.push(i);
                    render();
                }
            }
            g.appendChild(b);
        }
        document.getElementById('count').innerText = count;
        document.getElementById('bar').style.width = count + '%';
    }

    function abrirCheck() {
        if(!sel.length) return alert("Escolha pelo menos um número!");
        document.getElementById('resumo').innerText = `Números: ${sel.join(', ')} | Total: R$ ${(sel.length * valor).toFixed(2)}`;
        document.getElementById('modal-c').style.display = 'flex';
    }

    async function pagar() {
        const n = document.getElementById('i-nome').value;
        const z = document.getElementById('i-zap').value;
        if(!n || !z) return alert("Nome e Zap são obrigatórios!");

        // BUG DO LARANJA FIX: Marcar como pendente localmente antes de sair
        sel.forEach(num => { db[num] = { status: 'Pendente' }; });
        render();

        const b = document.getElementById('btn-pay'); b.innerText = "GERANDO LINK..."; b.disabled = true;
        const res = await fetch(`${API}/gerar-pagamento`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ numeros: sel, comprador: n, zap: z, vendedor: document.getElementById('i-vend').value })
        });
        const d = await res.json();
        if(d.link) {
            confetti({ particleCount: 150, colors: ['#007bff', '#ff0055'] });
            setTimeout(() => window.location.href = d.link, 1000);
        }
    }

    function admLogin() {
        senha = prompt("Senha Admin:");
        if(senha === 'IRB2026') {
            document.getElementById('view-vendas').style.display = 'none';
            document.getElementById('view-admin').style.display = 'block';
            renderAdm();
        }
    }

    function renderAdm() {
        const l = document.getElementById('lista-adm'); l.innerHTML = '';
        let pago = 0, pend = 0, total = 0;
        Object.keys(db).forEach(n => {
            const d = db[n]; total++;
            if(d.status === 'Pago') pago += valor; else pend += valor;
            l.innerHTML += `<tr>
                <td>#${n}</td><td>${d.nome}</td><td>${d.vendedor}</td>
                <td style="color:${d.status === 'Pago' ? '#00ff88' : '#f39c12'}">${d.status}</td>
                <td>
                    <button class="btn-adm" onclick="admAcao(${n}, 'pagar')">✔</button>
                    <button class="btn-adm" onclick="admAcao(${n}, 'excluir')">🗑</button>
                </td>
            </tr>`;
        });
        document.getElementById('adm-pago').innerText = `R$ ${pago}`;
        document.getElementById('adm-pend').innerText = `R$ ${pend}`;
        document.getElementById('adm-total').innerText = `${total}/100`;
    }

    async function admAcao(n, acao) {
        await fetch(`${API}/admin/acao`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ numero: n, acao, senha })
        });
        carregar();
    }

    async function mudarPreco() {
        const p = prompt("Novo Preço:");
        if(p) {
            await fetch(`${API}/admin/acao`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ acao: 'preco', novoPreco: p, senha })
            });
            carregar();
        }
    }

    async function limparTudo() {
        if(confirm("LIMPAR TODAS AS VENDAS?")) {
            await fetch(`${API}/admin/acao`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ acao: 'limpar', senha })
            });
            carregar();
        }
    }

    function filtrar() {
        const f = document.getElementById('busca').value.toUpperCase();
        const tr = document.getElementById('lista-adm').getElementsByTagName('tr');
        for (let i = 0; i < tr.length; i++) {
            tr[i].style.display = tr[i].innerText.toUpperCase().includes(f) ? '' : 'none';
        }
    }

    function fechar() { document.getElementById('modal-c').style.display = 'none'; }
    carregar();
    setInterval(carregar, 30000);
</script>
</body>
</html>
