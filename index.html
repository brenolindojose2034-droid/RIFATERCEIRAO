<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIFA DIA DAS MÃES | TERCEIRÃO 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0084ff; --pink: #ff0077; --dark: #05050f; --orange: #ff9500; --green: #00ff88; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }
        
        .header { background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&q=80&w=1000'); background-size: cover; padding: 60px 20px; text-align: center; border-bottom: 3px solid var(--blue); }
        /* Logo do Terceirão */
        .logo-img { max-width: 160px; margin-bottom: 15px; filter: drop-shadow(0 0 15px var(--blue)); }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5em; color: var(--pink); margin: 0; text-shadow: 0 0 20px var(--pink); text-transform: uppercase; }
        .header p { color: var(--blue); letter-spacing: 4px; font-weight: bold; margin-top: 10px; font-family: 'Orbitron'; }

        .container { max-width: 950px; margin: -50px auto 50px; padding: 15px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; font-size: 0.9em; text-transform: uppercase; }
        .bar-container { background: #111; border-radius: 50px; height: 16px; margin-bottom: 30px; border: 1px solid #222; overflow: hidden; position: relative; }
        .bar-fill { background: linear-gradient(90deg, var(--blue), #00d4ff); height: 100%; width: 0%; transition: 1.5s ease; box-shadow: 0 0 15px var(--blue); }

        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 12px; margin-bottom: 35px; }
        @media (max-width: 700px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .n { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 18px 0; border-radius: 15px; color: #fff; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1.1em; }
        .n.livre:hover { border-color: var(--blue); box-shadow: 0 0 20px var(--blue); transform: translateY(-3px); }
        .n.sel { background: var(--blue) !important; border: none; transform: scale(1.15); box-shadow: 0 0 25px var(--blue); z-index: 2; }
        .n.pendente { background: var(--orange) !important; color: #000; cursor: not-allowed; border: none; box-shadow: 0 0 15px var(--orange); }
        .n.pago { background: var(--green) !important; color: #000; cursor: not-allowed; border: none; box-shadow: 0 0 20px var(--green); }

        .btn-main { background: var(--blue); color: #fff; border: none; padding: 22px; border-radius: 50px; width: 100%; font-weight: 800; font-size: 1.3em; cursor: pointer; box-shadow: 0 10px 30px rgba(0, 132, 255, 0.4); text-transform: uppercase; letter-spacing: 2px; }
        .btn-main:hover { background: #0066cc; transform: scale(1.02); }

        /* Admin Professional View */
        .adm-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .adm-box { background: rgba(0,0,0,0.5); padding: 25px; border-radius: 25px; text-align: center; border-bottom: 4px solid var(--blue); }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { text-align: left; color: var(--blue); padding: 15px; border-bottom: 2px solid #222; text-transform: uppercase; font-size: 0.8em; }
        td { padding: 15px; border-bottom: 1px solid #111; font-size: 0.9em; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
        .modal-box { background: #08080f; padding: 50px; border-radius: 40px; border: 1px solid var(--blue); width: 90%; max-width: 500px; text-align: center; box-shadow: 0 0 50px var(--blue); }
        input { width: 100%; padding: 18px; margin: 15px 0; border-radius: 15px; border: 1px solid #222; background: #000; color: #fff; font-size: 1em; }
        input:focus { border-color: var(--blue); outline: none; }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" class="logo-img" alt="TERCEIRÃO 2026" onerror="this.style.display='none'">
    <h1>RIFA DIA DAS MÃES</h1>
    <p>TERCEIRÃO 2026</p>
</div>

<div class="container">
    <div id="view-vendas">
        <div class="card">
            <div class="stats">
                <span>VENDIDOS: <span id="c-count">0</span>/100</span>
                <span style="color:var(--blue)">VALOR DA COTA: R$ <span id="c-preco">0.00</span></span>
            </div>
            <div class="bar-container"><div class="bar-fill" id="bar"></div></div>
            <div class="grid" id="grid"></div>
            <button class="btn-main" id="res-btn" onclick="abrirCheck()">RESERVAR SELECIONADOS</button>
            <button onclick="admLogin()" style="background:none; border:none; color:#111; width:100%; margin-top:50px; cursor:pointer;">Acesso Restrito ⚙️</button>
        </div>
    </div>

    <div id="view-admin" style="display:none;">
        <div class="adm-grid">
            <div class="adm-box"><h4>Dinheiro em Caixa</h4><p id="adm-p" style="color:var(--green); font-size: 1.6em; font-weight: bold;">R$ 0</p></div>
            <div class="adm-box"><h4>Reservas (Laranja)</h4><p id="adm-r" style="color:var(--orange); font-size: 1.6em; font-weight: bold;">R$ 0</p></div>
            <div class="adm-box"><h4>Ranking Vendas</h4><div id="ranking" style="font-size: 0.8em; margin-top:10px; color: #aaa;"></div></div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:25px; flex-wrap: wrap; gap:10px;">
                <button onclick="mudarPreco()" style="background: var(--blue); color: white; border:none; padding: 10px 20px; border-radius: 10px; cursor:pointer;">💲 Alterar Preço</button>
                <button onclick="baixarPlanilha()" style="background: var(--green); color: black; border:none; padding: 10px 20px; border-radius: 10px; cursor:pointer;">📥 Baixar Lista CSV</button>
                <button onclick="limparTudo()" style="background: transparent; color: red; border: 1px solid red; padding: 10px 20px; border-radius: 10px; cursor:pointer;">🗑 Reset Geral</button>
            </div>
            <input type="text" id="busca" placeholder="Filtrar por nome, número ou vendedor..." onkeyup="filtrar()">
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Nº</th><th>Comprador</th><th>Quem Vendeu</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="lista-adm"></tbody>
                </table>
            </div>
            <button class="btn-main" onclick="location.reload()" style="margin-top:30px; background:#111;">SAIR DO PAINEL</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-c">
    <div class="modal-box">
        <h2 style="color:var(--blue)">CHECKOUT SEGURO</h2>
        <p id="resumo" style="color: #888; margin-bottom: 20px;"></p>
        <input type="text" id="f-nome" placeholder="Seu Nome Completo">
        <input type="tel" id="f-zap" placeholder="WhatsApp (DDD + Número)">
        <input type="text" id="f-vend" placeholder="Quem te vendeu? (Opcional)">
        <button class="btn-main" id="btn-pay" onclick="pagar()">GERAR PAGAMENTO PIX</button>
        <button onclick="fechar()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
    const API = 'https://rifa-backend-e44o.onrender.com';
    let db = {}, valor = 10, sel = [], senha = '';

    async function carregar() {
        try {
            const r = await fetch(`${API}/status-rifa`);
            const d = await r.json();
            db = d.dados; valor = d.preco;
            document.getElementById('c-preco').innerText = valor.toFixed(2);
            render();
            if(document.getElementById('view-admin').style.display === 'block') renderAdm();
        } catch (e) { console.error("Erro de conexão"); }
    }

    function render() {
        const g = document.getElementById('grid'); g.innerHTML = '';
        let count = 0;
        for(let i=1; i<=100; i++) {
            const b = document.createElement('button'); b.innerText = i; b.className = 'n';
            
            if(db[i]) {
                // BUG FIX: Garante que a classe 'pendente' ou 'pago' seja aplicada corretamente
                b.classList.add(db[i].status === 'Pago' ? 'pago' : 'pendente');
                count++;
            } else {
                b.classList.add('livre');
                if(sel.includes(i)) b.classList.add('sel');
                b.onclick = () => {
                    if(sel.includes(i)) sel = sel.filter(x => x!==i);
                    else sel.push(i);
                    render();
                }
            }
            g.appendChild(b);
        }
        document.getElementById('c-count').innerText = count;
        document.getElementById('bar').style.width = count + '%';
    }

    function abrirCheck() {
        if(!sel.length) return alert("Selecione os seus números da sorte!");
        document.getElementById('resumo').innerText = `Números: ${sel.join(', ')} | Total: R$ ${(sel.length * valor).toFixed(2)}`;
        document.getElementById('modal-c').style.display = 'flex';
    }

    async function pagar() {
        const n = document.getElementById('f-nome').value;
        const z = document.getElementById('f-zap').value;
        if(!n || !z) return alert("Preencha Nome e WhatsApp!");

        // 🚀 OPTIMISTIC UI: Força a cor laranja localmente para evitar o bug de delay
        sel.forEach(num => { db[num] = { status: 'Pendente' }; });
        render();

        const b = document.getElementById('btn-pay'); b.innerText = "RESERVANDO... ⏳"; b.disabled = true;
        
        try {
            const res = await fetch(`${API}/gerar-pagamento`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    numeros: sel, 
                    comprador: n, 
                    zap: z, 
                    vendedor: document.getElementById('f-vend').value 
                })
            });
            const d = await res.json();
            if(d.link) {
                confetti({ particleCount: 200, colors: ['#0084ff', '#ff0077', '#00ff88'] });
                setTimeout(() => window.location.href = d.link, 1200);
            } else {
                alert("Erro: Este número pode ter sido reservado por outra pessoa agora mesmo.");
                location.reload();
            }
        } catch (e) { alert("Erro de conexão com o servidor."); b.disabled = false; }
    }

    function admLogin() {
        senha = prompt("Senha do Admin Terceirão:");
        if(senha === 'IRB2026') {
            document.getElementById('view-vendas').style.display = 'none';
            document.getElementById('view-admin').style.display = 'block';
            renderAdm();
        }
    }

    function renderAdm() {
        const l = document.getElementById('lista-adm'); l.innerHTML = '';
        const rankDiv = document.getElementById('ranking'); rankDiv.innerHTML = '';
        let p = 0, r = 0;
        let rank = {};

        Object.keys(db).forEach(n => {
            const d = db[n];
            if(d.status === 'Pago') { p += valor; rank[d.vendedor] = (rank[d.vendedor] || 0) + 1; }
            else r += valor;

            l.innerHTML += `<tr>
                <td><strong>#${n}</strong></td><td>${d.nome}</td><td>${d.vendedor}</td>
                <td style="color:${d.status === 'Pago' ? 'var(--green)' : 'var(--orange)'}; font-weight:bold">${d.status}</td>
                <td>
                    <button style="cursor:pointer" onclick="admAcao(${n}, 'pagar')">✔</button>
                    <button style="cursor:pointer" onclick="admAcao(${n}, 'excluir')">🗑</button>
                </td>
            </tr>`;
        });
        document.getElementById('adm-p').innerText = `R$ ${p.toFixed(2)}`;
        document.getElementById('adm-r').innerText = `R$ ${r.toFixed(2)}`;
        
        Object.entries(rank).sort((a,b)=>b[1]-a[1]).forEach(([nome, qtd]) => {
            rankDiv.innerHTML += `<div>${nome || "Direta"}: ${qtd} cotas pagas</div>`;
        });
    }

    async function admAcao(n, acao) {
        await fetch(`${API}/admin/acao`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ numero: n, acao, senha })
        });
        carregar();
    }

    async function mudarPreco() {
        const p = prompt("Digite o novo valor da cota:");
        if(p) {
            await fetch(`${API}/admin/acao`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ acao: 'preco', novoPreco: p, senha })
            });
            carregar();
        }
    }

    function baixarPlanilha() {
        let csv = "Cota,Comprador,Zap,Vendedor,Status\n";
        Object.keys(db).forEach(n => {
            const d = db[n];
            csv += `${n},${d.nome},${d.zap},${d.vendedor},${d.status}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Relatorio_Rifa_Terceirao_2026.csv";
        link.click();
    }

    async function limparTudo() { if(confirm("Deseja apagar TODOS os registros?")) { await fetch(`${API}/admin/acao`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ acao: 'limpar', senha }) }); carregar(); } }

    function filtrar() {
        const f = document.getElementById('busca').value.toUpperCase();
        const tr = document.getElementById('lista-adm').getElementsByTagName('tr');
        for (let i = 0; i < tr.length; i++) { tr[i].style.display = tr[i].innerText.toUpperCase().includes(f) ? '' : 'none'; }
    }

    function fechar() { document.getElementById('modal-c').style.display = 'none'; }
    carregar();
    setInterval(carregar, 30000);
</script>
</body>
</html>
